name: karatou
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+45

environment:
  sdk: ">=3.3.0 <4.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.6
  get: ^4.6.6
  readmore: ^3.0.0
  intl: ^0.20.2
  dio: ^5.4.1
  crypto: ^3.0.6
  logger: ^2.0.2+1
  logging: ^1.2.0
  http: ^1.2.2
  fluttertoast: ^9.0.0
  flutter_expandable_fab: ^2.0.0
  uuid: ^4.3.3
  share_plus: ^12.0.2
  permission_handler: ^12.0.1
  url_launcher: ^6.2.6
  shared_preferences: ^2.3.5
  # Inbound `kpb://` deep links (iOS URL scheme + Android intent-filter). Already
  # resolved transitively via supabase_flutter; pinned direct so we can import it.
  app_links: ^7.0.0
  cached_network_image: ^3.4.1
  pin_code_fields: ^9.3.0
  flutter_localizations:
    sdk: flutter
  get_storage: ^2.1.1
  image_picker: ^1.0.7
  flutter_screenutil: ^5.9.1
  flutter_svg: ^2.0.10+1
  country_picker: ^2.0.26
  firebase_core: ^4.7.0
  flutter_launcher_icons: ^0.14.4
  percent_indicator: ^4.2.3
  nb_utils: ^7.0.5
  video_player: ^2.9.2
  webview_flutter: ^4.10.0
  file_picker: ^11.0.2
  speech_to_text: ^7.0.0
  change_app_package_name: ^1.4.0
  flutter_widget_from_html: ^0.17.2
  timeago: ^3.7.0
  flutter_speed_dial: ^7.0.0
  font_awesome_flutter: ^11.0.0
  flutter_staggered_grid_view: ^0.7.0
  fl_chart: ^1.2.0
  youtube_player_flutter: ^9.1.1
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  socket_io_client: ^3.0.2
  flutter_secure_storage: ^10.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  supabase_flutter: ^2.5.6

  collection: any
  syncfusion_flutter_pdfviewer: ^33.2.3
  local_auth: ^3.0.1
  onesignal_flutter: ^5.0.0
  lottie: ^3.3.3
  shimmer: ^3.0.0
  quick_actions: ^1.1.0
  pdf: ^3.12.0
  printing: ^5.14.3
  package_info_plus: ^9.0.1
  posthog_flutter: ^5.32.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

dependency_overrides:
  # connectivity_plus 7.1.x uses NWPath.isUltraConstrained (iOS 18.4 SDK / Xcode 26.1.1).
  # Pin to 6.x until CI runners ship that Xcode version.
  connectivity_plus: ^6.1.0
  # device_info_plus 12.x uses isiOSAppOnVision (requires Xcode 15.2+ SDK not yet on CI).
  device_info_plus: ^11.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/svgs/
    - assets/images/
    - assets/services/
    - assets/icon/
    - assets/images/logo/
    - assets/images/bg_imgs/
    - assets/images/on_boarding_img/
    - assets/images/others/
    - assets/gifs/
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # App-engagement handoff typography: Inter (body) + Plus Jakarta Sans
  # (headings). Static TTFs bundled offline (subsets latin + latin-ext for
  # French diacritics), SIL Open Font License 1.1 — see assets/fonts/README.md.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800

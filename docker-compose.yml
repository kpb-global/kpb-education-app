# ─────────────────────────────────────────────────────────────────────────────
# Production deploy — Hostinger VPS behind the EXISTING Traefik v3.
#
# This box already runs a containerized Traefik (external network `traefik`)
# that owns :80/:443 and issues Let's Encrypt certs (HTTP-01, resolver
# `letsencrypt`). The KPB app therefore does NOT run its own nginx and does NOT
# publish 80/443: `api` and `admin` join the shared `traefik` network and are
# routed by host-based labels. `db` + `clamav` stay on a PRIVATE `internal`
# network — the marketing stack (n8n/mautic/…) can never reach the PII database.
#
# Per-container mem_limit caps guard the shared 8 GB box: a leak in one service
# can't OOM-kill the student-facing API. See docs/DEPLOYMENT.md.
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: kpb-backend:${KPB_IMAGE_TAG:-local}
    container_name: kpb_api
    restart: always
    # No host port: ingress is via the shared Traefik (labels below).
    mem_limit: 768m
    networks:
      - traefik # reached by Traefik for api.kpbeducation.cloud
      - internal # private link to db + clamav
    # All values come from the root .env file (see backend/.env.example).
    # No insecure defaults: a missing required secret makes the app fail loud at boot.
    environment:
      - NODE_ENV=production
      - PORT=3000 # container port Traefik load-balances to (app default is 4000)
      - KPB_BUILD_SHA=${KPB_BUILD_SHA:-}
      # Timezone for scheduled reminders + date math (Node honors TZ via ICU).
      # Defaults to the primary audience zone; override in .env if needed.
      - TZ=${TZ:-Africa/Niamey}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kpb}?schema=public
      # ── Required secrets — the app throws on boot if any is unset in production ──
      - KPB_JWT_SECRET=${KPB_JWT_SECRET}
      - KPB_JWT_REFRESH_SECRET=${KPB_JWT_REFRESH_SECRET}
      - KPB_ADMIN_REFRESH_SECRET=${KPB_ADMIN_REFRESH_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - KPB_MIN_APP_VERSION=${KPB_MIN_APP_VERSION:-0.0.0}
      - KPB_ANDROID_STORE_URL=${KPB_ANDROID_STORE_URL:-}
      - KPB_IOS_STORE_URL=${KPB_IOS_STORE_URL:-}
      - KPB_MVP_ONLY=${KPB_MVP_ONLY:-true}
      # One Nginx proxy is trusted to provide the real client IP for throttling.
      - KPB_TRUST_PROXY_HOPS=${KPB_TRUST_PROXY_HOPS:-1}
      # Needed so account deletion also removes the Supabase Auth identity
      # (GDPR + Apple/Google account-deletion requirement). Without it, the
      # Postgres data is purged but the login survives.
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      # ── Feature integrations (optional; leave blank to disable the feature) ──
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-}
      - ONESIGNAL_APP_ID=${ONESIGNAL_APP_ID:-}
      - ONESIGNAL_REST_API_KEY=${ONESIGNAL_REST_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      # Newsletter bourses — Mautic tourne sur le même VPS (stack marketing).
      - MAUTIC_BASE_URL=${MAUTIC_BASE_URL:-}
      - MAUTIC_USERNAME=${MAUTIC_USERNAME:-}
      - MAUTIC_PASSWORD=${MAUTIC_PASSWORD:-}
      - MAUTIC_SEGMENT_ID=${MAUTIC_SEGMENT_ID:-}
      - KPB_MAGIC_LINK_FROM=${KPB_MAGIC_LINK_FROM:-}
      - KPB_MAGIC_LINK_WEB_BASE=${KPB_MAGIC_LINK_WEB_BASE:-}
      - KPB_CAMPAIGN_MAIL_FROM=${KPB_CAMPAIGN_MAIL_FROM:-}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - YOUTUBE_PLAYLIST_ID=${YOUTUBE_PLAYLIST_ID:-}
      # Flight price search (Kayak Price-Insights affiliate API; leave blank
      # to fall back to a browser deeplink).
      - KPB_KAYAK_API_KEY=${KPB_KAYAK_API_KEY:-}
      - KPB_KAYAK_BASE_URL=${KPB_KAYAK_BASE_URL:-}
      - KPB_KAYAK_USER_AGENT=${KPB_KAYAK_USER_AGENT:-}
      # Uploads: set the S3 vars for object storage (recommended in production),
      # or rely on the local-disk fallback, which is persisted on the
      # kpb-uploads volume below.
      - KPB_S3_ENDPOINT=${KPB_S3_ENDPOINT:-}
      - KPB_S3_REGION=${KPB_S3_REGION:-}
      - KPB_S3_BUCKET=${KPB_S3_BUCKET:-}
      - KPB_S3_ACCESS_KEY_ID=${KPB_S3_ACCESS_KEY_ID:-}
      - KPB_S3_SECRET_ACCESS_KEY=${KPB_S3_SECRET_ACCESS_KEY:-}
      - KPB_S3_PUBLIC_BASE_URL=${KPB_S3_PUBLIC_BASE_URL:-}
      - KPB_S3_FORCE_PATH_STYLE=${KPB_S3_FORCE_PATH_STYLE:-}
      - KPB_UPLOADS_DIR=${KPB_UPLOADS_DIR:-/app/uploads}
      - KPB_UPLOADS_PUBLIC_URL=${KPB_UPLOADS_PUBLIC_URL:-}
      # Competition Readiness is dark by default and can be rolled out without
      # shipping a new mobile build. Secrets/budgets are never returned by config/app.
      - KPB_COMPETITION_READINESS_ENABLED=${KPB_COMPETITION_READINESS_ENABLED:-false}
      - KPB_SUCCESS_LAB_ENABLED=${KPB_SUCCESS_LAB_ENABLED:-false}
      - KPB_AI_DIAGNOSTIC_ENABLED=${KPB_AI_DIAGNOSTIC_ENABLED:-false}
      - KPB_AI_DIAGNOSTIC_KILL_SWITCH=${KPB_AI_DIAGNOSTIC_KILL_SWITCH:-true}
      - KPB_AI_DIAGNOSTIC_MODEL=${KPB_AI_DIAGNOSTIC_MODEL:-}
      - KPB_APPLICATION_ARTIFACTS_ENABLED=${KPB_APPLICATION_ARTIFACTS_ENABLED:-false}
      - KPB_APPLICATION_ARTIFACT_MAX_BYTES=${KPB_APPLICATION_ARTIFACT_MAX_BYTES:-10485760}
      - KPB_STUDY_REVIEW_ENABLED=${KPB_STUDY_REVIEW_ENABLED:-false}
      - KPB_STUDY_REVIEW_SLA_HOURS=${KPB_STUDY_REVIEW_SLA_HOURS:-48}
      - KPB_EVIDENCE_ACCESS_TTL_SECONDS=${KPB_EVIDENCE_ACCESS_TTL_SECONDS:-60}
      - KPB_EVIDENCE_ACCESS_SECRET=${KPB_EVIDENCE_ACCESS_SECRET:-}
      - KPB_AI_DIAGNOSTIC_MIN_AGE=${KPB_AI_DIAGNOSTIC_MIN_AGE:-13}
      - KPB_AI_DIAGNOSTIC_PROMPT_VERSION=${KPB_AI_DIAGNOSTIC_PROMPT_VERSION:-success-lab-v1}
      - KPB_AI_DIAGNOSTIC_MAX_INPUT_CHARS=${KPB_AI_DIAGNOSTIC_MAX_INPUT_CHARS:-8000}
      - KPB_AI_DIAGNOSTIC_MAX_BILLABLE_INPUT_TOKENS=${KPB_AI_DIAGNOSTIC_MAX_BILLABLE_INPUT_TOKENS:-12000}
      - KPB_AI_DIAGNOSTIC_MAX_OUTPUT_TOKENS=${KPB_AI_DIAGNOSTIC_MAX_OUTPUT_TOKENS:-220}
      - KPB_AI_DIAGNOSTIC_DAILY_CALL_CAP=${KPB_AI_DIAGNOSTIC_DAILY_CALL_CAP:-100}
      - KPB_AI_DIAGNOSTIC_USER_DAILY_ATTEMPT_CAP=${KPB_AI_DIAGNOSTIC_USER_DAILY_ATTEMPT_CAP:-3}
      - KPB_AI_DIAGNOSTIC_MONTHLY_BUDGET_MICROS_USD=${KPB_AI_DIAGNOSTIC_MONTHLY_BUDGET_MICROS_USD:-0}
      - KPB_AI_DIAGNOSTIC_PRICE_VERSION=${KPB_AI_DIAGNOSTIC_PRICE_VERSION:-}
      - KPB_AI_DIAGNOSTIC_CRITERIA_MAX_AGE_DAYS=${KPB_AI_DIAGNOSTIC_CRITERIA_MAX_AGE_DAYS:-180}
      - KPB_SUCCESS_LAB_PILOT_COUNTRIES=${KPB_SUCCESS_LAB_PILOT_COUNTRIES:-NE,SN,CI}
      - KPB_SUCCESS_LAB_ROLLOUT_PERCENT=${KPB_SUCCESS_LAB_ROLLOUT_PERCENT:-0}
      - KPB_FEATURE_ROLLOUT_SECRET=${KPB_FEATURE_ROLLOUT_SECRET:-}
      - KPB_ANALYTICS_ACTOR_SECRET=${KPB_ANALYTICS_ACTOR_SECRET:-}
      - KPB_OUTBOX_BATCH_SIZE=${KPB_OUTBOX_BATCH_SIZE:-10}
      - KPB_OUTBOX_LEASE_MS=${KPB_OUTBOX_LEASE_MS:-300000}
      - KPB_OUTBOX_MAX_ATTEMPTS=${KPB_OUTBOX_MAX_ATTEMPTS:-8}
      - KPB_OUTBOX_RETRY_BASE_MS=${KPB_OUTBOX_RETRY_BASE_MS:-5000}
      - KPB_OUTBOX_RETRY_CAP_MS=${KPB_OUTBOX_RETRY_CAP_MS:-3600000}
      - KPB_OUTCOME_EVIDENCE_ENABLED=${KPB_OUTCOME_EVIDENCE_ENABLED:-false}
      - KPB_OUTCOME_EVIDENCE_MAX_PENDING_PER_WORKSPACE=${KPB_OUTCOME_EVIDENCE_MAX_PENDING_PER_WORKSPACE:-20}
      - KPB_OUTCOME_REFERENCE_HMAC_SECRET=${KPB_OUTCOME_REFERENCE_HMAC_SECRET:-}
      - KPB_IMPACT_PUBLIC_STATS_ENABLED=${KPB_IMPACT_PUBLIC_STATS_ENABLED:-false}
      # Antivirus: uploads are scanned by the clamav sidecar before being
      # persisted (fail-closed). Set CLAMAV_HOST= (empty) in .env to disable.
      # Note `${VAR-default}` (no colon): an explicitly empty value disables
      # scanning, while an unset var defaults to the sidecar.
      - CLAMAV_HOST=${CLAMAV_HOST-clamav}
      - CLAMAV_PORT=${CLAMAV_PORT:-3310}
    volumes:
      # Persist uploaded case documents across container recreation
      # (`docker compose up -d --build`). Without this, the local-disk fallback
      # lives on the container's ephemeral layer and every redeploy wipes it.
      - kpb-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be genuinely ready
      clamav:
        # `service_started`, NOT `service_healthy`: ClamAV's first boot spends
        # minutes downloading signatures; uploads simply 503 (fail-closed)
        # until clamd is ready, and the rest of the API must not wait on it.
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health/live').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      # Host-based routing through the shared Traefik. WebSockets (case chat)
      # pass through transparently on the same router.
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.kpbapi.rule=Host(`api.kpbeducation.cloud`)"
      - "traefik.http.routers.kpbapi.entrypoints=websecure"
      - "traefik.http.routers.kpbapi.tls=true"
      - "traefik.http.routers.kpbapi.tls.certresolver=letsencrypt"
      - "traefik.http.services.kpbapi.loadbalancer.server.port=3000"

  # Antivirus daemon for uploaded case documents. The API streams every upload
  # to clamd (INSTREAM, port 3310) before persisting it — files never leave the
  # compose network. Needs ~1–1.5 GB RAM; signatures live on kpb-clamav-db and
  # are refreshed by the image's built-in freshclam.
  clamav:
    image: clamav/clamav:stable
    container_name: kpb_clamav
    restart: always
    mem_limit: 1536m
    # Private network only: never exposed to Traefik or the marketing stack.
    networks:
      - internal
    volumes:
      - kpb-clamav-db:/var/lib/clamav

  db:
    image: postgres:15-alpine
    container_name: kpb_db
    restart: always
    mem_limit: 1g
    networks:
      - internal
    ports:
      - "127.0.0.1:5432:5432" # localhost only — for pg_dump / manual psql on the VPS
    # No default credentials — compose errors if these are not set in .env.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kpb}
    volumes:
      - kpb-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-kpb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Automated PostgreSQL backups: one gzipped pg_dump per day into ./backups
  # (a host bind mount, so dumps survive `docker compose down -v`), with
  # retention. Copy ./backups off-site too — see docs/DEPLOYMENT.md.
  db-backup:
    image: postgres:15-alpine
    container_name: kpb_db_backup
    restart: always
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      PGDATABASE: ${POSTGRES_DB:-kpb}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - ./backend/scripts/backup-loop.sh:/usr/local/bin/backup-loop.sh:ro
      - ./backups:/backups
    entrypoint: ["sh", "/usr/local/bin/backup-loop.sh"]

  # Admin console (Next.js standalone). Routed by Traefik for
  # admin.kpbeducation.cloud. The API base URL is inlined at BUILD time
  # (NEXT_PUBLIC_*), so rebuild the image if it changes.
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_KPB_API_BASE_URL: ${KPB_ADMIN_API_BASE_URL:-https://api.kpbeducation.cloud/api}
    image: kpb-admin:${KPB_IMAGE_TAG:-local}
    container_name: kpb_admin
    restart: always
    mem_limit: 384m
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.kpbadmin.rule=Host(`admin.kpbeducation.cloud`)"
      - "traefik.http.routers.kpbadmin.entrypoints=websecure"
      - "traefik.http.routers.kpbadmin.tls=true"
      - "traefik.http.routers.kpbadmin.tls.certresolver=letsencrypt"
      - "traefik.http.services.kpbadmin.loadbalancer.server.port=3000"

  # Site légal statique sur le domaine racine (kpbeducation.cloud + www).
  # Les stores exigent des URLs web permanentes : politique de confidentialité
  # (Play Console) et procédure de suppression de compte (Apple + Play). Le DNS
  # `@` et `www` pointent déjà sur ce VPS ; sans ce service, Traefik renvoyait
  # un 404 sur le domaine racine.
  web:
    image: nginx:1.27-alpine
    container_name: kpb_web
    restart: always
    mem_limit: 64m
    networks:
      - traefik
    volumes:
      - ./web/public:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.kpbweb.rule=Host(`kpbeducation.cloud`) || Host(`www.kpbeducation.cloud`)"
      - "traefik.http.routers.kpbweb.entrypoints=websecure"
      - "traefik.http.routers.kpbweb.tls=true"
      - "traefik.http.routers.kpbweb.tls.certresolver=letsencrypt"
      - "traefik.http.services.kpbweb.loadbalancer.server.port=80"

networks:
  # The shared edge network created by the existing Traefik stack. It must
  # already exist:  docker network create traefik  (or it is created by the
  # marketing compose). `external: true` = we attach, we don't own it.
  traefik:
    external: true
  # Private network for the app's own data plane (api ↔ db ↔ clamav).
  internal:
    driver: bridge

volumes:
  kpb-db-data:
  kpb-uploads:
  kpb-clamav-db:

# KPB Education — site légal statique (kpbeducation.cloud).
# Servi derrière le Traefik partagé (TLS terminé là-bas) ; ce nginx ne parle
# que du HTTP interne au réseau `traefik`.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Les stores référencent ces URLs de façon permanente : tout chemin inconnu
    # retombe sur l'accueil plutôt qu'un 404 nu.
    error_page 404 /index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self'" always;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /styles.css {
        expires 1h;
    }
}

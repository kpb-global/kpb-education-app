name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Validate Prisma schema
        # Schema-only check (no DB connection); prisma validate just needs the
        # datasource env var to resolve, so a throwaway URL is sufficient.
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
        run: npx prisma validate

      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Lint
        run: npm run lint
        
      - name: Build NestJS Sandbox
        run: npm run build
        
      - name: Run Unit Tests
        run: npm run test
        
  # Note: A deployment job can be added here once the VPS SSH Key is set as a Secret.
  # Example: Appleboy SSH Action to pull the latest image and restart docker-compose.

name: Flutter CI

# Phase 7 merge gate: analyze + tests on every PR; full builds on pushes to default branches.
on:
  push:
    branches: [master, main]
    tags: ['v*']
    paths:
      - 'lib/**'
      - 'test/**'
      - 'docs/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'docs/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/flutter-ci.yml'

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test (no remote catalog sync)
        # Goldens exclues : générées/comparées en local macOS (le rendu de
        # police Linux diffère) — voir docs/fable-global-theme-architecture.md §11.5.
        run: flutter test --exclude-tags=golden --dart-define=KPB_ENABLE_REMOTE_SYNC=false

  build-android:
    name: Build Android APK (debug validation)
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android licenses & install SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --dart-define=KPB_APP_ENV=prod --dart-define=KPB_WHATSAPP_NUMBER=+33768674292 --dart-define=POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: app-debug-android
          path: build/app/outputs/flutter-apk/app-debug.apk

  release-android:
    name: Produce signed Android App Bundle
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - name: Verify and install upload signing key
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_PASSWORD"
          test -n "$KEY_ALIAS"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          test -s android/upload-keystore.jks
          cat > android/key.properties << EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=../upload-keystore.jks
          EOF

      - name: Accept Android licenses & install SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build signed production AAB
        # Production host is the branded domain (api.kpbeducation.cloud/api),
        # resolved from KPB_APP_ENV=prod in app_config.dart. Do not hardcode a
        # KPB_API_BASE_URL override here.
        run: flutter build appbundle --release --dart-define=KPB_APP_ENV=prod --dart-define=KPB_WHATSAPP_NUMBER=+33768674292 --dart-define=POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}

      - name: Verify App Bundle signature
        run: jarsigner -verify -strict -certs build/app/outputs/bundle/release/app-release.aab

      - name: Upload signed AAB
        uses: actions/upload-artifact@v5
        with:
          name: app-release-android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS (no codesign)
    needs: quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Pod install (fresh resolve)
        run: cd ios && rm -f Podfile.lock && pod install --repo-update

      - name: Build iOS
        run: flutter build ios --release --no-codesign --dart-define=KPB_APP_ENV=prod --dart-define=KPB_WHATSAPP_NUMBER=+33768674292 --dart-define=POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}

      - name: Upload iOS build
        uses: actions/upload-artifact@v5
        with:
          name: app-release-ios
          path: build/ios/iphoneos/Runner.app

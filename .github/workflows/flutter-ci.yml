name: Flutter CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'android/**'
      - 'ios/**'
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Format
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test --dart-define=KPB_ENABLE_REMOTE_SYNC=false
        
      - name: Build APK
        # Change this URL to your PlanetHoster VPS IP or Domain
        run: flutter build apk --release --dart-define=KPB_API_BASE_URL=https://api.vps-planethoster.com
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test --dart-define=KPB_ENABLE_REMOTE_SYNC=false
        
      - name: Build iOS (No Codesign for CI tests)
        # Note: True CD requires Provisioning Profiles injection
        run: flutter build ios --release --no-codesign --dart-define=KPB_API_BASE_URL=https://api.vps-planethoster.com
        
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ios
          path: build/ios/iphoneos/Runner.app

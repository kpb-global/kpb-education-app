name: Flutter CI

# Phase 7 merge gate: analyze + tests on every PR; full builds on pushes to default branches.
on:
  push:
    branches: [master, main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/flutter-ci.yml'

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Optional follow-up: add `dart format --set-exit-if-changed lib test` after a one-time format pass.
      - name: Analyze
        run: flutter analyze

      - name: Test (no remote catalog sync)
        run: flutter test --dart-define=KPB_ENABLE_REMOTE_SYNC=false

  build-android:
    name: Build Android APK
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android licenses & install SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        # Signs with play upload keystore when key.properties is present; otherwise uses
        # default debug keystore (see android/app/build.gradle) so CI needs no secrets.
        run: flutter build apk --release --dart-define=KPB_API_BASE_URL=https://api.vps-planethoster.com

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS (no codesign)
    needs: quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Pod install (fresh resolve)
        run: cd ios && rm -f Podfile.lock && pod install --repo-update

      - name: Build iOS
        run: flutter build ios --release --no-codesign --dart-define=KPB_API_BASE_URL=https://api.vps-planethoster.com

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ios
          path: build/ios/iphoneos/Runner.app

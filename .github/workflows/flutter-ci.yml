name: Flutter CI

# Phase 7 merge gate: analyze + tests on every PR; full builds on pushes to default branches.
on:
  push:
    branches: [master, main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'docs/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'docs/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/flutter-ci.yml'

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Optional follow-up: add `dart format --set-exit-if-changed lib test` after a one-time format pass.
      - name: Analyze
        run: flutter analyze

      - name: Test (no remote catalog sync)
        run: flutter test --dart-define=KPB_ENABLE_REMOTE_SYNC=false

  build-android:
    name: Build Android APK
    needs: quality
    runs-on: ubuntu-latest
    # `secrets` is NOT available in step-level `if:` expressions (GH Actions
    # context restriction) — referencing it there makes the workflow file fail
    # to parse and skip every job in 0s. Expose presence as a job-level env so
    # the `if:` lines below can read `env.ANDROID_KEYSTORE_BASE64`.
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      # Optional Play / upload signing — add repo secrets (Settings → Secrets and variables → Actions):
      #   ANDROID_KEYSTORE_BASE64  — base64 of your .jks (printf '%s' "$(base64 -i upload.keystore)")
      #   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD, ANDROID_KEY_ALIAS
      # If ANDROID_KEYSTORE_BASE64 is unset, the build uses debug keystore (android/app/build.gradle).
      - name: Decode upload keystore (when secrets configured)
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          # Tolerate an invalid/placeholder secret: warn + fall back to the
          # debug keystore rather than failing the whole build.
          if printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks 2>/dev/null; then
            echo "✓ Release keystore decoded"
          else
            echo "::warning::ANDROID_KEYSTORE_BASE64 is set but is not valid base64 — falling back to debug keystore."
            rm -f android/upload-keystore.jks
          fi

      # Only write key.properties when the keystore actually decoded successfully.
      - name: Write android/key.properties (when keystore decoded)
        if: env.ANDROID_KEYSTORE_BASE64 != '' && hashFiles('android/upload-keystore.jks') != ''
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties << EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=../upload-keystore.jks
          EOF

      - name: Accept Android licenses & install SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        # NOTE: the client uses KPB_API_BASE_URL verbatim — it MUST include the
        # `/api` suffix. Confirm the production host; to ship the branded domain
        # instead, drop this override and pass --dart-define=KPB_APP_ENV=prod.
        run: flutter build apk --release --dart-define=KPB_API_BASE_URL=https://api.vps-planethoster.com/api --dart-define=KPB_WHATSAPP_NUMBER=+33768674292

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: app-release-android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS (no codesign)
    needs: quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Pod install (fresh resolve)
        run: cd ios && rm -f Podfile.lock && pod install --repo-update

      - name: Build iOS
        run: flutter build ios --release --no-codesign --dart-define=KPB_API_BASE_URL=https://api.vps-planethoster.com/api --dart-define=KPB_WHATSAPP_NUMBER=+33768674292

      - name: Upload iOS build
        uses: actions/upload-artifact@v5
        with:
          name: app-release-ios
          path: build/ios/iphoneos/Runner.app

name: Keystore info

# Affiche l'empreinte du certificat de la clé d'upload (SHA-1/SHA-256 + date de
# création) SANS exposer la clé. Une empreinte de certificat est une donnée
# publique (Play Console l'affiche) ; elle sert à vérifier la continuité de
# signature avec l'app déjà publiée (com.karatou.android) avant un upload.
on:
  workflow_dispatch:

jobs:
  fingerprint:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
    steps:
      - name: Print upload-key certificate fingerprint
        # Diagnostic SANS exposer le secret : longueurs, classe de caractères,
        # magic bytes du fichier décodé (FEEDFEED=JKS, 3082=PKCS12 — valeurs
        # publiques), puis empreinte du certificat (donnée publique).
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          CLEAN=$(printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d ' \t\r\n"')
          echo "longueur brute: ${#ANDROID_KEYSTORE_BASE64} / nettoyée: ${#CLEAN}"
          if printf '%s' "$CLEAN" | grep -qE '^[A-Za-z0-9+/=]+$'; then
            echo "alphabet: base64 standard"
          elif printf '%s' "$CLEAN" | grep -qE '^[A-Za-z0-9_=-]+$'; then
            echo "alphabet: base64 URL-safe"
          else
            echo "alphabet: caractères NON base64 présents"
            printf '%s' "$CLEAN" | tr -d 'A-Za-z0-9+/=_-' | head -c 40 | od -c | head -3
          fi
          (printf '%s' "$CLEAN" | base64 --decode > ks.jks 2>/dev/null && echo "décodage standard: OK") \
            || (printf '%s' "$CLEAN" | tr '_-' '/+' | base64 --decode > ks.jks 2>/dev/null && echo "décodage URL-safe: OK") \
            || { echo "décodage impossible — le secret n'est pas du base64 valide"; exit 1; }
          echo "magic bytes: $(head -c 4 ks.jks | od -An -tx1 | tr -d ' ')"
          keytool -list -v -keystore ks.jks -storepass "$STORE_PASSWORD" 2>&1 \
            | grep -E "Alias name|Creation date|Valid from|SHA1:|SHA256:|password was incorrect" || true
          rm -f ks.jks

name: Keystore info

# Affiche l'empreinte du certificat de la clé d'upload (SHA-1/SHA-256 + date de
# création) SANS exposer la clé. Une empreinte de certificat est une donnée
# publique (Play Console l'affiche) ; elle sert à vérifier la continuité de
# signature avec l'app déjà publiée (com.karatou.android) avant un upload.
on:
  workflow_dispatch:

jobs:
  fingerprint:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
    steps:
      - name: Print upload-key certificate fingerprint
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          # Le secret peut contenir des retours à la ligne (base64 replié à la
          # création) : on les retire avant décodage, sinon `base64: invalid input`.
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d ' \t\r\n' | base64 --decode > ks.jks
          keytool -list -v -keystore ks.jks -storepass "$STORE_PASSWORD" \
            | grep -E "Alias name|Creation date|Valid from|SHA1:|SHA256:" || true
          rm -f ks.jks
